upstream php_fpm {
    server 127.0.0.1:9000;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Livewire/Filament file uploads POST to PHP before moving to S3.
    client_max_body_size 64m;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Media proxy: serves files from Cloudflare R2 through our domain so
    # browsers that block pub-*.r2.dev can still load images.
    # URL path: /media/pprc-media/<key> → R2 public URL /<key>
    location /media/pprc-media/ {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        proxy_http_version 1.1;
        proxy_set_header Host pub-25103d239ba14111a39be3d5eb04b7b0.r2.dev;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;

        proxy_buffering on;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_hide_header X-Amz-Request-Id;
        proxy_hide_header X-Amz-Id-2;

        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;

        proxy_pass https://pub-25103d239ba14111a39be3d5eb04b7b0.r2.dev/;
    }

    # Fallback for any other /media/ paths (e.g. future MinIO uploads)
    location /media/ {
        proxy_http_version 1.1;
        proxy_set_header Host              pprc-minio:9000;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_pass http://pprc-minio:9000/;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_read_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
