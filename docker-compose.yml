services:
  pgsql:
    image: postgres:16-alpine
    container_name: pprc-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: pprc
      POSTGRES_USER: pprc
      POSTGRES_PASSWORD: pprc
    ports:
      - "55432:5432"
    volumes:
      - pprc-pgsql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pprc -d pprc"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: pprc-redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - pprc-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: pprc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pprcadmin
      MINIO_ROOT_PASSWORD: pprcadmin123
    ports:
      - "59000:9000"
      - "59001:9001"
    volumes:
      - pprc-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-createbucket:
    image: minio/mc:latest
    container_name: pprc-minio-createbucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 pprcadmin pprcadmin123;
      mc mb --ignore-existing local/pprc-media;
      mc anonymous set download local/pprc-media;
      exit 0;
      "

volumes:
  pprc-pgsql:
  pprc-redis:
  pprc-minio:
